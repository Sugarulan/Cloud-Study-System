# Dev Profile：使用 docker-compose 起的 MySQL + Redis + MinIO
# 启动方式：
#   1) docker compose -f deploy/docker-compose.yml up -d mysql redis minio
#   2) mvn spring-boot:run -pl gac-lms-app -Dspring-boot.run.profiles=dev

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gac_lms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID

logging:
  level:
    com.gac.lms: DEBUG
    com.baomidou.mybatisplus: INFO
