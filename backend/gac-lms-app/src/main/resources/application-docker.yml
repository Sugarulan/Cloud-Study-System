# Docker Profile：在容器内运行时使用
# 容器内通过服务名（mysql / redis / minio）访问基础设施

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/gac_lms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123456

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password:
      database: 0

gac:
  lms:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: minioadmin
      secret-key: minioadmin
      bucket: gac-lms
    ai:
      provider: ${AI_PROVIDER:mock}

logging:
  level:
    com.gac.lms: INFO
