server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: gac-lms

  # ====================================================================
  # 默认 profile：使用 MySQL（需先启动 docker-compose 里的 mysql 容器）。
  # 启动命令：
  #   docker compose -f deploy/docker-compose.yml up -d mysql redis
  #   mvn spring-boot:run -pl backend/gac-lms-app
  # 如果想用其他环境，把 application-{dev,docker,prod}.yml 抽出来即可。
  # ====================================================================

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # ===== 数据源：MySQL（连接本地 Docker 起的 MySQL）=====
  datasource:
    url: jdbc:mysql://localhost:3306/gac_lms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:                                  # HikariCP：Spring Boot 默认的数据库连接池
      maximum-pool-size: 20                  # 最多 20 个连接
      minimum-idle: 5                        # 至少保持 5 个空闲连接
      connection-timeout: 30000              # 获取连接超时 30 秒

  # ===== Redis：缓存（连接本地 Docker 起的 Redis）=====
  data:
    redis:
      host: localhost
      port: 6379
      password:                              # 没设密码就留空
      database: 0                            # 0 号库（Redis 默认有 16 个库 0~15）
      timeout: 3000ms                        # 命令超时 3 秒
      lettuce:                               # Lettuce：Redis 官方推荐的 Java 客户端
        pool:
          max-active: 8                      # 最大连接数
          max-idle: 8                        # 最大空闲连接
          min-idle: 0                        # 最小空闲连接

  # ===== Servlet 上传文件大小限制 =====
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ===== 启动时自动执行 SQL 脚本（建表 + 种子数据）=====
  # 第一次启动时会跑 db/schema.sql 建表，跑 db/data.sql 插入种子数据。
  # 后续启动如果表已存在，schema.sql 会因 continue-on-error: false 报错停服 —— 这是为了安全。
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gac.lms.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: ASSIGN_ID

# ===== MinIO=====
gac:
  lms:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:gac-lms}
    # ===== AI 配置（默认 mock，零依赖即可跑通主流程） =====
    # 切换为 openai-compatible 后将启用 OpenAICompatibleLLMProvider（RestClient 直连）
    ai:
      provider: ${AI_PROVIDER:mock}
      openai:
        base-url: ${OPENAI_BASE_URL:http://internal-llm.gac.local/v1}
        api-key: ${OPENAI_API_KEY:sk-placeholder}
        model: ${OPENAI_MODEL:qwen-plus}
        temperature: 0.3

# ===== Resilience4j=====
resilience4j:
  circuitbreaker:
    instances:
      llmService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# ===== SpringDoc / Knife4j =====
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# ===== 日志 =====
logging:
  level:
    root: INFO
    com.gac.lms: DEBUG
