server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: gac-lms
  # ====================================================================
  # 默认 profile：不激活 dev/docker，直接使用本文件的 H2 内存数据库，
  # 真正“开箱即用、零外部中间件”即可启动。
  # 如需接入真实 MySQL/Redis/MinIO，启动时追加：
  #   --spring.profiles.active=dev
  # 并按 application-dev.yml 启动 docker-compose 提供的中间件。
  # ====================================================================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # ===== 数据源（默认 H2 内存库，开箱即用，无需安装任何外部服务） =====
  datasource:
    url: jdbc:h2:mem:gac_lms;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Web 控制台：http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===== Redis（Lettuce 客户端懒连接：默认启动不强依赖外部 Redis） =====
  # 默认指向 localhost:6379；若未启动 Redis，应用仍可启动，
  # 仅在真正调用 Redis 时才会报错（如答题暂存）。
  # 启动 docker-compose 的 redis 后即可正常使用。
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

  # ===== Servlet 上传 =====
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gac.lms.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: ASSIGN_ID

# ===== MinIO=====
gac:
  lms:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:gac-lms}
    # ===== AI 配置（默认 mock，零依赖即可跑通主流程） =====
    # 切换为 openai-compatible 后将启用 OpenAICompatibleLLMProvider（RestClient 直连）
    ai:
      provider: ${AI_PROVIDER:mock}
      openai:
        base-url: ${OPENAI_BASE_URL:http://internal-llm.gac.local/v1}
        api-key: ${OPENAI_API_KEY:sk-placeholder}
        model: ${OPENAI_MODEL:qwen-plus}
        temperature: 0.3

# ===== Resilience4j=====
resilience4j:
  circuitbreaker:
    instances:
      llmService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# ===== SpringDoc / Knife4j =====
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# ===== 日志 =====
logging:
  level:
    root: INFO
    com.gac.lms: DEBUG
