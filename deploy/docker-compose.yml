version: "3.8"

# =====================================================
# GAC-LMS 开发环境：一键启动 MySQL + Redis + MinIO + Backend + Frontend
#
# 启动：
#   docker compose -f deploy/docker-compose.yml up -d
#
# 关闭：
#   docker compose -f deploy/docker-compose.yml down
#
# 重置数据（慎用）：
#   docker compose -f deploy/docker-compose.yml down -v
# =====================================================

services:
  # -----------------------------------------------------
  # MySQL 8 主库
  # -----------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: gac-lms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: gac_lms
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/sql/full-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------
  # Redis 7 缓存
  # -----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gac-lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--requirepass", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------
  # MinIO 对象存储
  # -----------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: gac-lms-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------------------
  # 后端 Spring Boot（W1 阶段先注释，启���后再开）
  # -----------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: gac-lms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      AI_PROVIDER: mock
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

  # -----------------------------------------------------
  # 前端 Vue3（W1 阶段先注释，启动后再开）
  # -----------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: gac-lms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
  redis-data:
  minio-data:
